# ExifTool GUI — Dockhand-optimized Compose Stack
#
# Deployment via Dockhand GitOps:
#   1. Repo unter Settings > Git hinterlegen
#   2. Stack erstellen > "From Git" > compose.yaml wird automatisch erkannt
#   3. Variablen als "Config Set" hinterlegen (siehe .env.example)
#   4. Optional: Webhook für Auto-Sync bei Push aktivieren
#
# GUI-Zugriff via Browser (noVNC):
#   http://<synology-ip>:6080
#
# Kein manuelles Anlegen von Verzeichnissen nötig —
# Docker verwaltet das Config-Volume automatisch.
# Fotos-Pfad muss existieren: PHOTOS_DIR im Config Set setzen.

services:

  # noVNC: virtueller X11-Display, GUI im Browser erreichbar (headless)
  novnc:
    image: theasp/novnc:latest
    container_name: exiftool-novnc
    restart: unless-stopped
    environment:
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=800
      - RUN_XTERM=no
    ports:
      - "${NOVNC_PORT:-6080}:8080"
    networks:
      - exiftool-net

  exiftool-gui:
    image: sturmi77/exiftool-gui:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exiftool-gui
    restart: unless-stopped
    depends_on:
      - novnc

    environment:
      - DISPLAY=novnc:0

    volumes:
      # Fotos-Verzeichnis vom Host (Pfad via Config Set setzen)
      - ${PHOTOS_DIR:-/volume1/photos}:/photos:rw
      # App-Konfiguration als named volume — Docker legt es automatisch an
      # unter /volume1/@docker/volumes/exiftool_config/_data
      # Kein manuelles mkdir nötig!
      - exiftool_config:/home/exifuser/.config/exiftool-gui

    networks:
      - exiftool-net

    labels:
      - "dockhand.stack=exiftool-gui"
      - "dockhand.description=EXIF date & GPS location editor GUI"
      - "dockhand.update.vulnerability-criteria=critical"

    healthcheck:
      test: ["CMD", "python", "-c", "import tkinter"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  exiftool-net:
    driver: bridge

# Named volume — wird von Docker automatisch erstellt und verwaltet.
# Kein driver_opts, kein bind, keine Pfad-Probleme auf Synology.
volumes:
  exiftool_config:
