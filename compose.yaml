# ExifTool GUI — Dockhand-optimized Compose Stack
#
# Dockhand-Deployment via GitOps:
#   1. Repo in Dockhand unter Settings > Git hinterlegen
#   2. Neuen Stack erstellen > "From Git" wählen
#   3. Diese Datei wird automatisch erkannt (compose.yaml hat Vorrang)
#   4. Config Sets oder Umgebungsvariablen für PHOTOS_DIR setzen
#   5. Optional: Webhook für Auto-Sync bei Push aktivieren
#
# X11-Voraussetzung auf dem Host (einmalig):
#   xhost +local:docker
#
# WICHTIG: STACK_DATA_DIR muss auf dem Host existieren, bevor der Stack startet!
#   Synology:  mkdir -p /volume1/docker/exiftool-gui/data
#   Linux:     mkdir -p /opt/docker/exiftool-gui/data

services:
  exiftool-gui:
    image: sturmi77/exiftool-gui:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exiftool-gui
    restart: "no"            # GUI-App: kein automatischer Neustart

    environment:
      - DISPLAY=${DISPLAY:-:0}

    volumes:
      # X11-Socket für GUI-Anzeige auf dem Host
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # Foto-Verzeichnis vom Host einbinden
      # Wert in Dockhand via "Config Sets" oder .env setzen
      - ${PHOTOS_DIR:-/tmp/photos}:/photos:rw

      # App-Konfiguration persistent halten
      # Verzeichnis MUSS vor dem ersten Start auf dem Host existieren:
      #   Synology: mkdir -p /volume1/docker/exiftool-gui/data
      #   Linux:    mkdir -p /opt/docker/exiftool-gui/data
      - ${STACK_DATA_DIR:-/volume1/docker/exiftool-gui/data}:/home/exifuser/.config/exiftool-gui

    networks:
      - exiftool-net

    labels:
      - "dockhand.stack=exiftool-gui"
      - "dockhand.description=EXIF date & GPS location editor GUI"
      - "dockhand.update.vulnerability-criteria=critical"

    healthcheck:
      test: ["CMD", "python", "-c", "import tkinter"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  exiftool-net:
    driver: bridge
