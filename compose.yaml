# ExifTool GUI — Dockhand-optimized Compose Stack
#
# Dockhand-Deployment via GitOps:
#   1. Repo in Dockhand unter Settings > Git hinterlegen
#   2. Neuen Stack erstellen > "From Git" wählen
#   3. Diese Datei wird automatisch erkannt (compose.yaml hat Vorrang)
#   4. Config Sets oder Umgebungsvariablen für PHOTOS_DIR setzen
#   5. Optional: Webhook für Auto-Sync bei Push aktivieren
#
# X11-Voraussetzung auf dem Host (einmalig):
#   xhost +local:docker
#
# WICHTIG für Dockhand (matching paths):
#   Der Stack-Pfad in Dockhand muss mit dem tatssächlichen Host-Pfad
#   übereinstimmen. Empfohlen: /opt/dockhand/stacks/exiftool-gui/
#   Dann liegt compose.yaml auch auf dem Host unter diesem Pfad.

services:
  exiftool-gui:
    image: sturmi77/exiftool-gui:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exiftool-gui
    restart: "no"            # GUI-App: kein automatischer Neustart

    environment:
      - DISPLAY=${DISPLAY:-:0}

    volumes:
      # X11-Socket für GUI-Anzeige auf dem Host
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # Foto-Verzeichnis vom Host einbinden
      # Wert in Dockhand via "Config Sets" oder .env setzen:
      #   PHOTOS_DIR=/mnt/nas/fotos   oder   /home/user/Pictures
      - ${PHOTOS_DIR:-/tmp/photos}:/photos:rw

      # App-Konfiguration persistent halten
      # Absoluter Pfad notwendig für Dockhand matching-paths Kompatibilität
      - exiftool-config:/home/exifuser/.config/exiftool-gui

    networks:
      - exiftool-net

    # Dockhand Labels für Stack-Metadaten und Update-Steuerung
    labels:
      - "dockhand.stack=exiftool-gui"
      - "dockhand.description=EXIF date & GPS location editor GUI"
      # Auto-Update-Strategie: nur updaten wenn keine kritischen Schwachstellen
      - "dockhand.update.vulnerability-criteria=critical"

    # Health check damit Dockhand den Container-Status korrekt anzeigt
    healthcheck:
      test: ["CMD", "python", "-c", "import tkinter"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  exiftool-net:
    driver: bridge

volumes:
  exiftool-config:
    driver: local
    # Expliziter Host-Pfad für Dockhand matching-paths
    # Pfad muss auf Host existieren: mkdir -p /opt/dockhand/stacks/exiftool-gui/data
    driver_opts:
      type: none
      o: bind
      device: ${STACK_DATA_DIR:-/opt/dockhand/stacks/exiftool-gui/data}
