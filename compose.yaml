# ExifTool GUI — Dockhand-optimized Compose Stack
#
# Deployment via Dockhand GitOps:
#   1. Repo unter Settings > Git hinterlegen
#   2. Stack erstellen > "From Git" > compose.yaml wird automatisch erkannt
#   3. Variablen als "Config Set" hinterlegen (siehe .env.example)
#   4. Optional: Webhook für Auto-Sync bei Push aktivieren
#
# GUI-Zugriff via Browser:
#   http://<synology-ip>:6080/vnc_auto.html

services:

  novnc:
    image: theasp/novnc:latest
    container_name: exiftool-novnc
    restart: unless-stopped
    environment:
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=800
      - RUN_XTERM=no
      - VNC_PATH=vnc_auto.html
    ports:
      - "${NOVNC_PORT:-6080}:8080"
    networks:
      - exiftool-net

  exiftool-gui:
    image: sturmi77/exiftool-gui:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exiftool-gui
    restart: unless-stopped
    depends_on:
      - novnc

    environment:
      - DISPLAY=novnc:0

    # Automatisch neuen Code pullen und App starten
    # git pull holt Änderungen aus GitHub bevor die App startet
    command: >-
      bash -c "cd /app &&
               git config --global --add safe.directory /app &&
               git pull --ff-only origin main 2>/dev/null || true &&
               sleep 2 &&
               python src/main.py"

    volumes:
      - ${PHOTOS_DIR:-/volume1/homes/Michael}:/photos:rw
      - exiftool_config:/home/exifuser/.config/exiftool-gui
      # Git-Repo einbinden damit git pull im Container funktioniert
      - .:/app:rw

    networks:
      - exiftool-net

    labels:
      - "dockhand.stack=exiftool-gui"
      - "dockhand.description=EXIF date & GPS location editor GUI"
      - "dockhand.update.vulnerability-criteria=critical"

    healthcheck:
      test: ["CMD", "python", "-c", "import tkinter"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 25s

networks:
  exiftool-net:
    driver: bridge

volumes:
  exiftool_config:
