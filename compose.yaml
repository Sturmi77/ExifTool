# ExifTool GUI — Dockhand-optimized Compose Stack (Web UI Version)
#
# Deployment via Dockhand GitOps:
#   1. Repo unter Settings > Git hinterlegen
#   2. Stack erstellen > "From Git" → compose.yaml wird automatisch erkannt
#   3. Variablen als "Config Set" hinterlegen (siehe .env.example)
#   4. Optional: Webhook für Auto-Sync bei Push aktivieren
#
# GUI-Zugriff via Browser (FastAPI Web UI):
#   http://<synology-ip>:6080/

services:

  exiftool-gui:
    image: sturmi77/exiftool-gui:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exiftool-gui
    restart: unless-stopped

    environment:
      # Basisverzeichnis im Container, in dem die Fotos liegen
      - PHOTOS_DIR=/photos

    ports:
      # Host-Port → Container-Port 8000 (FastAPI)
      - "${WEB_PORT:-6080}:8000"

    volumes:
      # Fotos-Verzeichnis vom Host (Pfad via Config Set setzen)
      - ${PHOTOS_DIR:-/volume1/homes/Michael}:/photos:rw
      # App-Konfiguration als named volume — optional für spätere Features
      - exiftool_config:/home/exifuser/.config/exiftool-gui

    labels:
      - "dockhand.stack=exiftool-gui"
      - "dockhand.description=EXIF date & location editor (Web UI)"
      - "dockhand.update.vulnerability-criteria=critical"

    healthcheck:
      # Einfache Healthcheck-Variante: prüft ob Python und FastAPI importierbar sind
      test: ["CMD", "python", "-c", "import fastapi"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 25s

volumes:
  exiftool_config:
