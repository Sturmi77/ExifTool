# ExifTool GUI — Dockhand-optimized Compose Stack
#
# Deployment via Dockhand GitOps:
#   1. Repo unter Settings > Git hinterlegen
#   2. Stack erstellen > "From Git" > compose.yaml wird automatisch erkannt
#   3. Variablen als "Config Set" in Dockhand hinterlegen (siehe .env.example)
#   4. Optional: Webhook für Auto-Sync bei Push aktivieren
#
# X11-Voraussetzung auf dem Host (einmalig):
#   xhost +local:docker
#
# STACK_DATA_DIR muss vor dem ersten Start existieren:
#   Synology: mkdir -p /volume1/docker/exiftool-gui/data
#   Linux:    mkdir -p /opt/docker/exiftool-gui/data

services:
  exiftool-gui:
    image: sturmi77/exiftool-gui:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exiftool-gui
    restart: "no"

    environment:
      - DISPLAY=${DISPLAY:-:0}

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${PHOTOS_DIR:-/volume1/photos}:/photos:rw
      - ${STACK_DATA_DIR:-/volume1/docker/exiftool-gui/data}:/home/exifuser/.config/exiftool-gui

    networks:
      - exiftool-net

    labels:
      - "dockhand.stack=exiftool-gui"
      - "dockhand.description=EXIF date & GPS location editor GUI"
      - "dockhand.update.vulnerability-criteria=critical"

    healthcheck:
      test: ["CMD", "python", "-c", "import tkinter"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  exiftool-net:
    driver: bridge
