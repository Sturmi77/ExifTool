name: Build & Push Docker Image

on:
  # Automatischer Build+Push bei semantischen Version-Tags (z.B. v0.2.0)
  push:
    tags:
      - 'v*.*.*'
  # Manueller Build weiterhin moeglich (z.B. fuer latest ohne neuen Tag)
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'latest-Tag pushen?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: sturmi77/exiftool-gui
          tags: |
            # Bei Tag-Push: semver-Tag + latest automatisch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Bei manuellem Dispatch: latest (wenn push_latest=true oder kein Input)
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.push_latest == 'true') || github.event_name == 'push' }}
            # Immer: SHA-Tag fuer Rollback
            type=sha,prefix=sha-

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
